<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator</title>

<style>
body{
    margin:0;
    font-family:'Segoe UI', sans-serif;
    background:#111827;
    color:#f9fafb;
}

header{
    background:#020617;
    padding:15px 30px;
}

.container{
    display:flex;
    justify-content:flex-start;
    padding:30px;
}

.box{
    background:#1f2933;
    padding:20px;
    border-radius:12px;
    width:300px;
}

.box h3{
    margin-top:0;
    color:#22c55e;
}

input, select{
    width:100%;
    padding:8px;
    margin-top:10px;
    border:none;
    border-radius:5px;
    outline:none;
}

button{
    width:100%;
    margin-top:10px;
    padding:8px;
    border:none;
    border-radius:5px;
    background:#22c55e;
    color:black;
    cursor:pointer;
}

.result{
    margin-top:15px;
    padding:10px;
    background:#374151;
    border-radius:8px;
}
</style>
</head>

<body>

<header>
<h2>Calculator</h2>
</header>

<div class="container">

<div class="box">
    <h3>Calculator</h3>

    <input type="number" id="num1" placeholder="First number">

    <select id="operator">
        <option value="+">+</option>
        <option value="-">-</option>
        <option value="*">*</option>
        <option value="/">/</option>
        <option value="%">&</option>
    </select>

    <input type="number" id="num2" placeholder="Second number">

    <button onclick="calculate()">Calculate</button>

</div>

</div>

<script>
function calculate(){
    let num1 = parseFloat(document.getElementById("num1").value);
    let num2 = parseFloat(document.getElementById("num2").value);
    let op = document.getElementById("operator").value;

    let result;

    if(isNaN(num1) || isNaN(num2)){
        alert("Please enter valid numbers");
        document.getElementById("result").innerText = "Result: Invalid input";
        return;
    }

    switch(op){
        case "+":
            result = num1 + num2;
            break;
        case "-":
            result = num1 - num2;
            break;
        case "*":
            result = num1 * num2;
            break;
        case "/":
            if(num2 === 0){
                alert("Cannot divide by zero");
                document.getElementById("result").innerText = "Result: Error";
                return;
            }
            result = num1 / num2;
            break;
        case "%":
            result = num1 % num2;
            break;
    }

    document.getElementById("result").innerText = "Result: " + result;

    alert("Result: " + result);
}
</script>

</body>
</html>
