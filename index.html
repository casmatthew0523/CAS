<!-- QUIZ -->
<div class="carousel-item active">
<h3>Quizzes and LAB</h3>

<div class="upload-box">
<input type="file" id="quizUpload" accept="image/*"><br><br>
<input type="number" id="quizScore" placeholder="Score"><br><br>
<button onclick="quizAdd()">Submit</button>
</div>

<p>Total: <span id="quizCount">0</span></p>
<p>Average: <span id="quizAvg">0</span></p>

<div id="quizPreview"></div>
</div>
